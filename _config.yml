# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.


# Site Settings
locale                   : "en-US"
title                    : Sal's Portfolio
title_separator          : "-"
subtitle                 : # site tagline that appears below site title in masthead
name                     : Salvatore Ciminello
description              : Salvatore Ciminello - Projects and CV
baseurl                  : "/sal-ciminello"  # Set this to your repo name 

# Theme and Style
#theme: jekyll-theme-minimal
color_scheme: light # light/default, dark, or aqua

sass:
  style: compressed

# Outputting
permalink: pretty

collections:
  projects:
    output: true
    permalink: /projects/:path/

# Markdown
markdown: kramdown
kramdown:
  input: GFM

include:
  - cv.html
  - projects.html
  - index.html

  

# Plugins (previously gems:)

exclude:
  - Gemfile
  - Gemfile.lock

plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

